<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto | TapiaDesign</title>
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/contacto.css">
</head>
<body>

    <header class="main-header">
        <div class="logo">TapiaDesign</div>
        <nav class="main-nav">
            <ul>
                <li><a href="../../index.html">Inicio</a></li>
                <li><a href="menu.html">Servicios</a></li>
                <li><a href="horarios.html">Horarios</a></li>
                <li><a href="contacto.html">Contacto</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <form id="contactForm" class="form-contacto" novalidate>
            <h2>Agendar Asesoría Técnica</h2>
            
            <div class="form-group">
                <label for="nombre">Nombre Completo:</label>
                <input type="text" id="nombre" name="nombre" required aria-required="true">
            </div>

            <div class="form-group">
                <label for="email">Correo Electrónico:</label>
                <input type="email" id="email" name="email" required aria-required="true">
            </div>

            <div class="form-group">
                <label for="mensaje">Cuéntanos sobre tu espacio:</label>
                <textarea id="mensaje" name="mensaje" required aria-required="true" placeholder="Ej: Remodelación de living familiar..."></textarea>
            </div>

            <button type="submit" class="btn-submit">Enviar Solicitud</button>
            
            <div id="errorFeedback" class="error-msg" role="alert" hidden></div>
            <div id="successFeedback" class="success-msg" role="status" hidden>¡Solicitud enviada con éxito! Nos contactaremos a la brevedad.</div>
        </form>
    </main>

    <script src="../js/form.js"></script>
</body>
</html>
