<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 50" width="260" height="50">
  <defs>
    <!-- Brillo sutil para el acento de diseño -->
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e67e22" />
      <stop offset="100%" stop-color="#d35400" />
    </linearGradient>
  </defs>

  <!-- Isotipo Abstracto: Líneas continuas de planos de diseño -->
  <g transform="translate(8, 7)">
    <!-- Base estructural blanca -->
    <path d="M5 35V5h20M15 5v30" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" opacity="0.4" />
    <!-- Línea fluida creativa en naranja que rompe la estructura fija -->
    <path d="M5 15c15-5,15,15,30,10v-15" fill="none" stroke="url(#orangeGrad)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
    <!-- Punto focal de iluminación -->
    <circle cx="35" cy="10" r="2.5" fill="#ffffff" />
  </g>
  
  <!-- Tipografía Corporativa Avanzada -->
  <text x="60" y="32" font-family="'Montserrat', 'Segoe UI', sans-serif" font-size="20" font-weight="800" letter-spacing="1" fill="#ffffff">
    TAPIA<tspan fill="url(#orangeGrad)" font-weight="300" letter-spacing="0">DESIGN</tspan>
  </text>
</svg>
